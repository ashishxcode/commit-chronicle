name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: gofmt -l cmd internal | tee /dev/stderr | (! read)
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
